name: Deploy Site

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      domain:
        description: Optional domain override for this run
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v6

      - name: Resolve deployment settings
        id: settings
        shell: bash
        run: |
          domain="${{ github.event.inputs.domain }}"
          if [[ -z "$domain" ]]; then
            domain="${{ vars.ALEPH_SITE_DOMAIN }}"
          fi
          if [[ -z "$domain" ]]; then
            domain="blog.le-space.de"
          fi
          echo "domain=$domain" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Install shared Aleph runner package
        id: aleph_runner
        shell: bash
        run: |
          runner_dir="${RUNNER_TEMP}/aleph-runner"
          rm -rf "$runner_dir"
          mkdir -p "$runner_dir"
          npm install --prefix "$runner_dir" --package-lock=false --no-audit --no-fund @le-space/node@0.1.43
          echo "dir=$runner_dir" >> "$GITHUB_OUTPUT"

      - name: Build app
        env:
          VITE_MODE: production
          VITE_SEED_NODES: /dns4/37-114-50-44.k51qzi5uqu5dirmjhgnwfimfdnpa4575o66r6ldgmtwue9nuci7etnctbzd68j.libp2p.direct/tcp/24029/tls/ws/p2p/12D3KooWGo8L4Ykg7AGaxFZiqunbnPsq6bMjsfp7WP3wyHSk8tAv,/dns4/mansion-old-afford-damp.2n6.me/tcp/443/tls/ws/p2p/12D3KooWGo8L4Ykg7AGaxFZiqunbnPsq6bMjsfp7WP3wyHSk8tAv,/dns6/2a0e-97c0-3e3-54b-3-8753-4011-9b91.k51qzi5uqu5dirmjhgnwfimfdnpa4575o66r6ldgmtwue9nuci7etnctbzd68j.libp2p.direct/tcp/24029/tls/ws/p2p/12D3KooWGo8L4Ykg7AGaxFZiqunbnPsq6bMjsfp7WP3wyHSk8tAv,/dns6/mansion-old-afford-damp.2n6.me/tcp/443/tls/ws/p2p/12D3KooWGo8L4Ykg7AGaxFZiqunbnPsq6bMjsfp7WP3wyHSk8tAv,/ip4/37.114.50.44/tcp/24029/tls/sni/37-114-50-44.k51qzi5uqu5dirmjhgnwfimfdnpa4575o66r6ldgmtwue9nuci7etnctbzd68j.libp2p.direct/ws/p2p/12D3KooWGo8L4Ykg7AGaxFZiqunbnPsq6bMjsfp7WP3wyHSk8tAv,/ip6/2a0e:97c0:3e3:54b:3:8753:4011:9b91/tcp/24029/tls/sni/2a0e-97c0-3e3-54b-3-8753-4011-9b91.k51qzi5uqu5dirmjhgnwfimfdnpa4575o66r6ldgmtwue9nuci7etnctbzd68j.libp2p.direct/ws/p2p/12D3KooWGo8L4Ykg7AGaxFZiqunbnPsq6bMjsfp7WP3wyHSk8tAv,/ip4/37.114.50.44/udp/24026/webrtc-direct/p2p/12D3KooWGo8L4Ykg7AGaxFZiqunbnPsq6bMjsfp7WP3wyHSk8tAv,/ip6/2a0e:97c0:3e3:54b:3:8753:4011:9b91/udp/24026/webrtc-direct/p2p/12D3KooWGo8L4Ykg7AGaxFZiqunbnPsq6bMjsfp7WP3wyHSk8tAv
          VITE_P2P_PUPSUB: todo._peer-discovery._p2p._pubsub
        run: pnpm run build

      - name: Install Aleph CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install aleph-client
          python3 -m pip install pycares==4.11.0

      - name: Prepare Aleph account
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
        run: |
          if [[ -z "${ALEPH_PRIVATE_KEY}" ]]; then
            echo "Missing ALEPH_PRIVATE_KEY secret." >&2
            exit 1
          fi
          mkdir -p "$HOME/.aleph-im/private-keys"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          private_key = os.environ["ALEPH_PRIVATE_KEY"].strip()
          if private_key.startswith("0x"):
              private_key = private_key[2:]

          key_bytes = bytes.fromhex(private_key)
          config_home = Path.home() / ".aleph-im"
          key_path = config_home / "private-keys" / "site-deploy.key"
          config_path = config_home / "config.json"

          key_path.write_bytes(key_bytes)
          config_path.write_text(json.dumps({"chain": "ETH", "path": str(key_path)}))
          print(f"Wrote Aleph key to {key_path}")
          print(f"Wrote Aleph config to {config_path}")
          PY

      - name: Publish dist to Aleph IPFS
        id: publish
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
          ALEPH_SITE_ALEPH_API_HOST: https://api1.aleph.cloud
          ALEPH_VM_MODE: site-publish
          ALEPH_SITE_PROJECT_DIR: ${{ github.workspace }}
          ALEPH_SITE_DIRECTORY: ${{ github.workspace }}/dist
          ALEPH_SITE_PIN: true
        run: node --input-type=module -e "const m = await import('${{ steps.aleph_runner.outputs.dir }}/node_modules/@le-space/node/index.js'); await m.runSiteMode(process.env)"

      - name: Link custom domain
        id: domain_link
        env:
          ALEPH_VM_MODE: site-domain-link
          ALEPH_SITE_PROJECT_DIR: ${{ github.workspace }}
          ALEPH_SITE_DOMAIN: ${{ steps.settings.outputs.domain }}
          ALEPH_SITE_ITEM_HASH: ${{ steps.publish.outputs.item_hash }}
          ALEPH_SITE_DOMAIN_CATCH_ALL_PATH: /index.html
        run: node --input-type=module -e "const m = await import('${{ steps.aleph_runner.outputs.dir }}/node_modules/@le-space/node/index.js'); await m.runSiteMode(process.env)"

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist

      - name: Deployment summary
        shell: bash
        run: |
          echo "Deployed domain: ${{ steps.domain_link.outputs.domain }}"
          echo "Aleph item hash: ${{ steps.publish.outputs.item_hash }}"
          echo "IPFS CID v0: ${{ steps.publish.outputs.ipfs_cid_v0 }}"
          echo "IPFS CID v1: ${{ steps.publish.outputs.ipfs_cid_v1 }}"
