name: Deploy Site

on:
  workflow_run:
    workflows:
      - Tests
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      relay_bootstrap_addr:
        description: Optional comma-separated production OrbitDB relay multiaddresses
        required: false
        type: string
      domain:
        description: Optional domain override for this run
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-site-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_sha == github.sha)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve deployment settings
        id: settings
        shell: bash
        run: |
          domain="${{ github.event.inputs.domain }}"
          if [[ -z "$domain" ]]; then
            domain="${{ vars.ALEPH_SITE_DOMAIN }}"
          fi
          if [[ -z "$domain" ]]; then
            domain="blog.le-space.de"
          fi
          echo "domain=$domain" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve reachable production OrbitDB relays
        env:
          RELAY_BOOTSTRAP_OVERRIDE: ${{ github.event.inputs.relay_bootstrap_addr || '' }}
        run: node scripts/resolve-aleph-bootstrap.mjs

      - name: Install shared Aleph runner package
        id: aleph_runner
        shell: bash
        run: |
          runner_dir="${RUNNER_TEMP}/aleph-runner"
          rm -rf "$runner_dir"
          mkdir -p "$runner_dir"
          npm install --prefix "$runner_dir" --package-lock=false --no-audit --no-fund @le-space/node@0.6.22
          echo "dir=$runner_dir" >> "$GITHUB_OUTPUT"

      - name: Write default blog config
        shell: bash
        env:
          ORBIT_BLOG_INITIAL_ADDRESS: ${{ vars.ORBIT_BLOG_INITIAL_ADDRESS }}
        run: |
          initial_address="${ORBIT_BLOG_INITIAL_ADDRESS:-/orbitdb/zdpuAyR7FpgoqyU2BgUeRZTFGHSZZCno5Rdz3ZLNXGzXh78uS}"
          mkdir -p public/.well-known
          ORBIT_BLOG_INITIAL_ADDRESS="$initial_address" node --input-type=module -e "import { mkdirSync, writeFileSync } from 'node:fs'; const initialAddress = process.env.ORBIT_BLOG_INITIAL_ADDRESS; const body = JSON.stringify({ initialAddress }, null, 2) + '\n'; mkdirSync('public/.well-known', { recursive: true }); writeFileSync('public/.well-known/orbit-blog.json', body);"

      - name: Build app
        env:
          VITE_MODE: production
          VITE_P2P_PUPSUB: todo._peer-discovery._p2p._pubsub
        run: pnpm run build

      - name: Publish dist to Aleph IPFS
        id: publish
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
          ALEPH_VM_MODE: site-publish
          ALEPH_SITE_PROJECT_DIR: ${{ github.workspace }}
          ALEPH_SITE_DIRECTORY: ${{ github.workspace }}/dist
          ALEPH_SITE_PIN: true
          ALEPH_SITE_REF: orbit-blog-prod
          ALEPH_SITE_RETENTION_KEEP_COUNT: 10
        run: node --input-type=module -e "const m = await import('${{ steps.aleph_runner.outputs.dir }}/node_modules/@le-space/node/index.js'); await m.runSiteMode(process.env)"

      - name: Link custom domain
        id: domain_link
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
          ALEPH_VM_MODE: site-domain-link
          ALEPH_SITE_PROJECT_DIR: ${{ github.workspace }}
          ALEPH_SITE_DOMAIN: ${{ steps.settings.outputs.domain }}
          ALEPH_SITE_ITEM_HASH: ${{ steps.publish.outputs.item_hash }}
          ALEPH_SITE_DOMAIN_CATCH_ALL_PATH: /index.html
        run: node --input-type=module -e "const m = await import('${{ steps.aleph_runner.outputs.dir }}/node_modules/@le-space/node/index.js'); await m.runSiteMode(process.env)"

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist

      - name: Deployment summary
        shell: bash
        run: |
          echo "Deployed domain: ${{ steps.domain_link.outputs.domain }}"
          echo "Aleph item hash: ${{ steps.publish.outputs.item_hash }}"
          echo "IPFS CID v0: ${{ steps.publish.outputs.ipfs_cid_v0 }}"
          echo "IPFS CID v1: ${{ steps.publish.outputs.ipfs_cid_v1 }}"
