name: WebRTC Compare

on:
  push:
    branches: [ e2e-relay-pinner ]
  workflow_dispatch:

jobs:
  webrtc-compare:
    name: WebRTC (${{ matrix.relay_mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        relay_mode: [local, remote]
    env:
      TEST_PRIVATE_KEY: 08011240821cb6bc3d4547fcccb513e82e4d718089f8a166b23ffcd4a436754b6b0774cf07447d1693cd10ce11ef950d7517bad6e9472b41a927cd17fc3fb23f8c70cd99
      METRICS_PORT: 0
      DEBUG: playwright:*
      PLAYWRIGHT_RELAY_MODE: ${{ matrix.relay_mode }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve current public OrbitDB relay
        if: matrix.relay_mode == 'remote'
        env:
          RELAY_BOOTSTRAP_WRITE_PLAYWRIGHT_ENV: 'true'
        run: node scripts/resolve-aleph-bootstrap.mjs

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run public relay replication specs
        if: matrix.relay_mode == 'remote'
        run: >-
          pnpm exec playwright test
          tests/AiRelayPinning.spec.ts
          tests/DBManagerRelayLeds.spec.ts
          tests/PostsRelayReplication.spec.ts
          --project=chromium --workers=1

      - name: Run WebRTC direct connectivity spec
        run: pnpm exec playwright test tests/WebRTCDirectConnectivity.spec.ts --project=chromium
